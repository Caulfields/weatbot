<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 20px #00ff8844, inset 0 0 50px #00ff8811;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2a 100%);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff88;
            font-size: 18px;
            text-shadow: 0 0 10px #00ff88;
        }
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff88;
        }
        h1 { font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 30px #00ff88; }
        p { font-size: 18px; margin-bottom: 30px; }
        button {
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            border: 2px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        button:hover {
            background: #00ff88;
            color: #0a0a0f;
            box-shadow: 0 0 30px #00ff88;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="game" width="800" height="600"></canvas>
        <div id="ui">
            <div>SCORE: <span id="score">0</span></div>
            <div>LIVES: <span id="lives">3</span></div>
            <div>WAVE: <span id="wave">1</span></div>
        </div>
        <div id="startScreen">
            <h1>SPACE SHOOTER</h1>
            <p>Mouse to move | Click to shoot</p>
            <button onclick="startGame()">START GAME</button>
        </div>
        <div id="gameOverScreen" class="hidden">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <button onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let wave = 1;
        let frames = 0;
        
        const player = {
            x: 400,
            y: 500,
            width: 40,
            height: 40,
            speed: 5,
            color: '#00ff88'
        };
        
        let bullets = [];
        let enemies = [];
        let particles = [];
        let mouseX = 400;
        let mouseY = 500;
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });
        
        canvas.addEventListener('mousedown', e => {
            if (gameRunning) shoot();
        });
        
        function shoot() {
            bullets.push({
                x: player.x,
                y: player.y - 20,
                width: 4,
                height: 15,
                speed: 10,
                color: '#ff0'
            });
        }
        
        function spawnEnemy() {
            const size = 30 + Math.random() * 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                width: size,
                height: size,
                speed: 2 + Math.random() * 2 + wave * 0.5,
                hp: Math.floor(wave / 2) + 1,
                color: `hsl(${Math.random() * 60 + 300}, 100%, 50%)`
            });
        }
        
        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 30,
                    color
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            player.x += (mouseX - player.x) * 0.15;
            player.y += (mouseY - player.y) * 0.15;
            
            player.x = Math.max(player.width/2, Math.min(canvas.width - player.width/2, player.x));
            player.y = Math.max(player.height/2, Math.min(canvas.height - player.height/2, player.y));
            
            bullets = bullets.filter(b => {
                b.y -= b.speed;
                return b.y > 0;
            });
            
            if (frames % Math.max(30, 60 - wave * 5) === 0) spawnEnemy();
            
            enemies.forEach((enemy, ei) => {
                enemy.y += enemy.speed;
                
                if (enemy.y > canvas.height) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    enemies.splice(ei, 1);
                    if (lives <= 0) gameOver();
                    return;
                }
                
                bullets.forEach((bullet, bi) => {
                    if (rectCollision(bullet, enemy)) {
                        enemy.hp--;
                        bullets.splice(bi, 1);
                        createParticles(bullet.x, bullet.y, '#ff0', 5);
                        if (enemy.hp <= 0) {
                            score += 100;
                            document.getElementById('score').textContent = score;
                            createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, enemy.color, 15);
                            enemies.splice(ei, 1);
                            if (score > 0 && score % 500 === 0) {
                                wave++;
                                document.getElementById('wave').textContent = wave;
                            }
                        }
                    }
                });
                
                if (rectCollision(player, enemy)) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    createParticles(player.x, player.y, '#00ff88', 20);
                    enemies.splice(ei, 1);
                    if (lives <= 0) gameOver();
                }
            });
            
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
            
            frames++;
        }
        
        function rectCollision(a, b) {
            return a.x - a.width/2 < b.x + b.width &&
                   a.x + a.width/2 > b.x &&
                   a.y - a.height/2 < b.y + b.height &&
                   a.y + a.height/2 > b.y;
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < 5; i++) {
                ctx.fillStyle = `rgba(255,255,255,${0.02 + Math.sin(frames * 0.05 + i) * 0.01})`;
                ctx.fillRect(0, (frames * 0.5 + i * 100) % canvas.height, canvas.width, 2);
            }
            
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.fillStyle = player.color;
            ctx.shadowColor = player.color;
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.moveTo(0, -20);
            ctx.lineTo(-15, 15);
            ctx.lineTo(0, 10);
            ctx.lineTo(15, 15);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            
            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.shadowColor = b.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(b.x - b.width/2, b.y - b.height/2, b.width, b.height);
            });
            
            enemies.forEach(e => {
                ctx.fillStyle = e.color;
                ctx.shadowColor = e.color;
                ctx.shadowBlur = 10;
                ctx.fillRect(e.x, e.y, e.width, e.height);
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                ctx.fillText(e.hp, e.x + e.width/2 - 4, e.y + e.height/2 + 4);
            });
            
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
            ctx.globalAlpha = 1;
            
            if (gameRunning) requestAnimationFrame(() => {
                update();
                draw();
            });
        }
        
        function startGame() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            score = 0;
            lives = 3;
            wave = 1;
            frames = 0;
            bullets = [];
            enemies = [];
            particles = [];
            player.x = 400;
            player.y = 500;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('wave').textContent = wave;
            gameRunning = true;
            draw();
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
    </script>
</body>
</html>
